name: Build
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check Out
      uses: actions/checkout@v3
    - name: Setup Dot Net Version
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.100
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test ISL.TPP.Core.Tests.Integrations/ISL.TPP.Core.Tests.Integrations.csproj --no-build --verbosity normal